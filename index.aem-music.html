    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root {
            --yt-bg: #0f0f0f;
            --yt-surface: #212121;
            --yt-surface-hover: #3d3d3d;
            --yt-border: #3f3f3f;
            --yt-text: #f1f1f1;
            --yt-text-secondary: #aaaaaa;
            --yt-blue: #3ea6ff;
            --yt-red: #ff0000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', Arial, sans-serif;
        }

        body {
            background-color: var(--yt-bg);
            color: var(--yt-text);
            overflow-x: hidden;
            height: 100vh;
            transition: background-color 0.3s;
        }

        .hidden { display: none !important; }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            padding: 0 16px;
            position: fixed;
            top: 0;
            width: 100%;
            background-color: var(--yt-bg);
            z-index: 1000;
            transition: background-color 0.3s;
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-btn, .icon-btn {
            font-size: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .menu-btn:hover, .icon-btn:hover { background-color: var(--yt-surface-hover); }

        .logo {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .icon-logo { color: var(--yt-red); font-size: 24px; transition: color 0.3s; }
        .logo-text { font-size: 20px; font-weight: 700; letter-spacing: -1px; transition: color 0.3s; }

        .header-center {
            display: flex;
            align-items: center;
            flex-grow: 1;
            max-width: 720px;
            margin: 0 40px;
        }

        .search-container {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 12px;
        }

        .search-bar {
            display: flex;
            flex-grow: 1;
            border: 1px solid var(--yt-border);
            border-radius: 40px;
            background-color: #121212;
            overflow: hidden;
        }

        .search-bar input {
            background: transparent;
            border: none;
            color: var(--yt-text);
            padding: 2px 16px;
            font-size: 16px;
            width: 100%;
            outline: none;
        }

        .search-btn {
            width: 64px;
            background-color: var(--yt-surface);
            border-left: 1px solid var(--yt-border);
            color: var(--yt-text-secondary);
            cursor: pointer;
        }

        .mic-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--yt-surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
        }

        .login-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--yt-border);
            border-radius: 18px;
            padding: 6px 12px;
            color: var(--yt-blue);
            font-weight: 500;
            cursor: pointer;
        }

        .profile-pic { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }

        /* BODY LAYOUT */
        .app-body { display: flex; padding-top: 56px; }

        .sidebar {
            width: 240px;
            background-color: var(--yt-bg);
            position: fixed;
            top: 56px;
            bottom: 0;
            left: 0;
            overflow-y: auto;
            transition: width 0.2s, background-color 0.3s;
            z-index: 900;
        }

        .sidebar.collapsed { width: 72px; }
        .sidebar.collapsed .nav-item span { display: none; }

        .nav-links { padding: 12px; display: flex; flex-direction: column; }
        .nav-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            color: var(--yt-text);
            text-decoration: none;
            margin-bottom: 2px;
        }

        .nav-item:hover, .nav-item.active { background-color: var(--yt-surface); }
        .nav-item i { width: 24px; font-size: 20px; margin-right: 20px; display: flex; justify-content: center; }

        .main-content {
            flex-grow: 1;
            margin-left: 240px;
            transition: margin-left 0.2s;
            min-height: calc(100vh - 56px);
        }

        body.sidebar-collapsed .main-content { margin-left: 72px; }

        /* FILTERS */
        .filter-chips {
            display: flex;
            gap: 12px;
            padding: 12px 24px;
            position: sticky;
            top: 56px;
            background-color: var(--yt-bg);
            z-index: 800;
            overflow-x: auto;
            transition: background-color 0.3s;
        }

        .chip {
            padding: 6px 12px;
            background-color: var(--yt-surface);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            border: none;
            color: var(--yt-text);
        }

        .chip.active { background-color: var(--yt-text); color: var(--yt-bg); }

        /* VIDEO GRID (PADRÃO) */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            padding: 24px;
        }

        .video-card { display: flex; flex-direction: column; cursor: pointer; margin-bottom: 20px; transition: transform 0.2s; }
        .thumbnail-container {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 12px;
            overflow: hidden;
            background-color: #333;
        }
        .thumbnail-container img { width: 100%; height: 100%; object-fit: cover; }
        .video-info-row { display: flex; gap: 12px; margin-top: 12px; }
        .channel-avatar { width: 36px; height: 36px; border-radius: 50%; background-color: #555; flex-shrink: 0; }
        .video-title { font-size: 16px; font-weight: 500; margin-bottom: 4px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.4; }
        .channel-name { font-size: 14px; color: var(--yt-text-secondary); }

        /* WATCH SECTION */
        .watch-section { padding: 24px; }
        .watch-layout { display: flex; gap: 24px; max-width: 1600px; margin: 0 auto; }
        .player-column { flex: 1; min-width: 0; transition: max-width 0.3s; }
        .player-wrapper { aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
        .player-wrapper iframe { width: 100%; height: 100%; border: none; }
        .video-details h2 { margin: 16px 0 8px; font-size: 20px; }
        .video-details p { background: var(--yt-surface); padding: 16px; border-radius: 12px; margin-top: 16px; font-size: 14px; white-space: pre-line; }
        
        .suggestions-column { width: 400px; }
        .suggestion-card { display: flex; gap: 8px; margin-bottom: 12px; cursor: pointer; }
        .suggestion-card img { width: 160px; aspect-ratio: 16/9; border-radius: 8px; object-fit: cover; }


        /* VOICE SEARCH */
        .voice-search-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .voice-search-content {
            background: var(--yt-surface);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            width: 400px;
        }
        .mic-active-btn {
            width: 80px; height: 80px; border-radius: 50%;
            background: var(--yt-red); color: white;
            font-size: 32px; border: none; margin-top: 20px;
        }

        /* UTILS */
        .spinner {
            width: 40px; height: 40px; border: 4px solid #333;
            border-top-color: white; border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 50px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 1000px) {
            .watch-layout { flex-direction: column; }
            .suggestions-column { width: 100%; }
        }

        /* YOUTUBE MUSIC DESIGN SYSTEM */
        .music-section { padding: 24px; min-height: 100vh; background: linear-gradient(180deg, #1d1d1d 0%, #030303 40%, #030303 100%); }
        .music-section::-webkit-scrollbar { width: 8px; }
        .music-section::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .music-header { margin-bottom: 32px; padding-top: 20px; }
        .music-header h1 { font-size: 42px; font-weight: 900; letter-spacing: -1px; margin-bottom: 16px; }
        .music-chips { display: flex; gap: 12px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px; }
        .music-chip { padding: 8px 16px; background: rgba(255,255,255,0.1); border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: background 0.2s; }
        .music-chip:hover { background: rgba(255,255,255,0.2); }
        .music-chip.active { background: #fff; color: #000; }
        
        .music-shelf { margin-bottom: 40px; }
        .music-shelf-title { font-size: 24px; font-weight: 700; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .music-grid-ytm { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 24px; }
        
        .music-card-ytm { cursor: pointer; transition: transform 0.2s; position: relative; }
        .music-card-ytm:hover { transform: scale(1.02); }
        .music-thumb-ytm { width: 100%; aspect-ratio: 1/1; border-radius: 6px; overflow: hidden; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 12px; }
        .music-thumb-ytm img { width: 100%; height: 100%; object-fit: cover; }
        .music-play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
        .music-card-ytm:hover .music-play-overlay { opacity: 1; }
        .music-play-overlay i { font-size: 40px; color: #fff; }
        
        .music-info-ytm .title { font-size: 15px; font-weight: 500; color: #fff; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; line-height: 1.2; }
        .music-info-ytm .subtitle { font-size: 13px; color: #aaa; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); width: 0; }
            .main-content { margin-left: 0 !important; }
        }
    </style>

        }

        async function fetchWithAuth(url) {
            if (!isTokenValid()) throw new Error('Sessão Expirada');
            const res = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
            
            if (res.status === 401) {
                // Caso extremo: o token era considerado válido no frontend mas o Google rejeitou
                accessToken = null;
                localStorage.removeItem('yt_access_token');
                localStorage.removeItem('yt_token_expiry');
                throw new Error('Sessão Expirada pelo Servidor');
            }
            return res;
        }

        function loadHome() {
            // Se estiver logado, mostra os vídeos mais populares do país (Home real)
            // Caso contrário, usa os tópicos aleatórios
            if (isTokenValid()) {
                fetchPopularVideos();
            } else {
                fetchVideos(getRandomTopic());
            }
        }

        async function fetchPopularVideos() {
            showView('home');
            homeGrid.innerHTML = '';
            loadingIndicator.classList.remove('hidden');
            try {
                const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,statistics&chart=mostPopular&maxResults=24&regionCode=BR&key=${API_KEY}`);
                const data = await res.json();
                loadingIndicator.classList.add('hidden');
                if (data.items) {
                    renderGrid(data.items);
                    renderSuggestions(data.items);
                }
            } catch (err) {
                fetchVideos(getRandomTopic());
            }
        }

        window.onload = () => {
            initGoogleAuth();
            loadHome();
        };

        function initGoogleAuth() {
            if (typeof google !== 'undefined') {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: SCOPES,
                    callback: (tokenResponse) => {
                        if (tokenResponse.access_token) {
                            accessToken = tokenResponse.access_token;
                            const expiresIn = tokenResponse.expires_in || 3599;
                            
                            localStorage.setItem('yt_access_token', accessToken);
                            localStorage.setItem('yt_token_expiry', Date.now() + (expiresIn * 1000));
                            
                            fetchUserProfile();

                            // Se a renovação ocorreu porque o usuário clicou em algo privado, prossegue com a ação
                            if (window.pendingAuthAction) {
                                window.pendingAuthAction();
                                window.pendingAuthAction = null;
                            }
                            
                            // Ao logar ou renovar, carrega as inscrições no sidebar
                            loadSidebarSubscriptions();
                        }
                    },
                });

                // LOGIN AUTOMÁTICO: Se o token é válido, puxa dados imediatamente
                if (isTokenValid()) {
                    if (!userProfile) fetchUserProfile();
                    loadSidebarSubscriptions();
                }

            } else {
                setTimeout(initGoogleAuth, 1000);
            }
        }

        async function fetchVideos(query) {
            showView('home');
            homeGrid.innerHTML = '';
            loadingIndicator.classList.remove('hidden');

            try {
                // Adicionamos um cabeçalho para evitar cache e garantir uma nova requisição limpa
                const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=24&q=${encodeURIComponent(query)}&type=video&key=${API_KEY}`);
                const data = await res.json();
                
                loadingIndicator.classList.add('hidden');

                if (data.error) {
                    throw new Error(data.error.message);
                }

                if (data.items && data.items.length > 0) {
                    renderGrid(data.items);
                    renderSuggestions(data.items);
                } else {
                    homeGrid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 40px;">
                        <i class="fa-solid fa-circle-exclamation" style="font-size: 48px; color: var(--yt-text-secondary); margin-bottom: 16px;"></i>
                        <p>Nenhum resultado encontrado para "${esc(query)}".</p>
                    </div>`;
                }
            } catch (err) {
                console.error("Erro na busca:", err);
                loadingIndicator.classList.add('hidden');
                homeGrid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 40px; color: #ff4e4e;">
                    <p>Erro na API (400/403): Limite de cota atingido ou Chave inválida.</p>
                    <small style="color: var(--yt-text-secondary)">${err.message}</small>
                </div>`;
            }
        }

        async function loadSidebarSubscriptions() {
            const subsContainer = document.getElementById('subsSection');
            const subsList = document.getElementById('sidebarSubsList');
            if (!subsContainer || !subsList) return;

            try {
                const res = await fetchWithAuth(`https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=50`);
                const data = await res.json();
                
                if (data.items && data.items.length > 0) {
                    subsContainer.classList.remove('hidden');
                    subsList.innerHTML = data.items.map(s => `
                        <a href="#" class="nav-item" onclick="fetchVideos('${s.snippet.title}')" style="padding: 8px 12px;">
                            <img src="${s.snippet.thumbnails.default.url}" style="width:24px; height:24px; border-radius:50%; margin-right:20px;">
                            <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${esc(s.snippet.title)}</span>
                        </a>
                    `).join('');
                }
            } catch (err) {
                console.warn("Não foi possível carregar inscrições laterais.");
            }
        }

        async function fetchAuthorizedData(endpoint) {
            showView('home');
            homeGrid.innerHTML = '';
            loadingIndicator.classList.remove('hidden');

            try {
                let url = '';
                if (endpoint === 'subscriptions') {
                    url = `https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=50`;
                } else if (endpoint === 'history' || endpoint === 'music') {
                    // Puxa as curtidas em geral do YouTube
                    url = `https://www.googleapis.com/youtube/v3/videos?part=snippet&myRating=like&maxResults=50`;
                }

                const res = await fetchWithAuth(url);
                const data = await res.json();
                loadingIndicator.classList.add('hidden');
                
                if (data.items) {
                    let itemsToRender = data.items;

                    if (endpoint === 'subscriptions') {
                        itemsToRender.forEach(i => i.isChannel = true);
                    } else if (endpoint === 'music') {
                        // Filtra o histórico puxado APENAS para vídeos de música (categoria 10)
                        itemsToRender = itemsToRender.filter(item => item.snippet && item.snippet.categoryId === '10');
                        
                        if (itemsToRender.length === 0) {
                            document.getElementById('musicGrid').innerHTML = '<p style="text-align:center; padding:40px; color:var(--yt-text-secondary); grid-column: 1 / -1;">Nenhuma música encontrada nas suas curtidas do YouTube.</p>';
                            return;
                        }
                        showView('music');
                        renderMusicGrid(itemsToRender);
                        return;
                    }
                    
                    renderGrid(itemsToRender);
                }
            } catch (err) { 
                console.error("Erro em dados privados:", err); 
                loadingIndicator.classList.add('hidden');
            }
        }

        function renderGrid(videos) {
            homeGrid.innerHTML = videos.map(v => {
                const vidId = extractVideoId(v);
                if (!vidId && !v.isChannel) return '';

                const thumbnail = v.snippet.thumbnails?.medium?.url || v.snippet.thumbnails?.default?.url || '';
                
                if (!v.isChannel) {
                    videoData[vidId] = {
                        title: v.snippet.title,
                        channel: v.snippet.channelTitle,
                        desc: v.snippet.description
                    };
                }

                const actionClass = v.isChannel ? '' : 'playable-video';
                const dataVid = v.isChannel ? '' : `data-vid="${vidId}"`;
                const cursorStyle = v.isChannel ? 'cursor: default;' : 'cursor: pointer;';

                return `
                <div class="video-card ${actionClass}" ${dataVid} style="${cursorStyle}">
                    <div class="thumbnail-container">
                        <img src="${thumbnail}" loading="lazy">
                    </div>
                    <div class="video-info-row">
                        <div class="channel-avatar"></div>
                        <div class="video-text">
                            <div class="video-title">${esc(v.snippet.title)}</div>
                            <div class="channel-name">${esc(v.snippet.channelTitle)}</div>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function renderSuggestions(videos) {
            document.getElementById('suggestionsList').innerHTML = videos.map(v => {
                const vidId = extractVideoId(v);
                if(!vidId) return '';

                videoData[vidId] = {
                    title: v.snippet.title,
                    channel: v.snippet.channelTitle,
                    desc: v.snippet.description
                };

                return `
                <div class="suggestion-card playable-video" data-vid="${vidId}">
                    <img src="${v.snippet.thumbnails.default.url}">
                    <div class="info">
                        <div class="video-title" style="font-size:13px; -webkit-line-clamp: 2;">${esc(v.snippet.title)}</div>
                        <div class="channel-name" style="font-size:11px;">${esc(v.snippet.channelTitle)}</div>
                    </div>
                </div>
            `}).join('');
        }

        function playVideo(id) {
            showView('watch');
            
            const vInfo = videoData[id] || {};
            const title = vInfo.title || 'Vídeo';
            const channel = vInfo.channel || '';
            const desc = vInfo.desc || '';

            document.getElementById('playerWrapper').innerHTML = `
                <iframe src="https://www.youtube.com/embed/${id}?autoplay=1&vq=highres" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            `;
            document.getElementById('currentVideoInfo').innerHTML = `
                <h2>${esc(title)}</h2>
                <div class="channel-name" style="margin-top:10px;"><b>${esc(channel)}</b></div>
                <p>${esc(desc) || 'Sem descrição.'}</p>
            `;
            window.scrollTo(0,0);
        }

        async function fetchUserProfile() {
            try {
                const res = await fetchWithAuth('https://www.googleapis.com/oauth2/v3/userinfo');
                const user = await res.json();
                if (user.picture) {
                    userProfile = user;
                    localStorage.setItem('yt_user_profile', JSON.stringify(user));
                    restoreUserUI();
                }
            } catch (e) { 
                console.warn("Erro ao buscar perfil:", e);
                // Limpa visualmente se houver erro definitivo de autenticação
                if (e.message.includes('Expirada')) {
                    userProfile = null;
                    localStorage.removeItem('yt_user_profile');
                    restoreUserUI();
                }
            }
        }

        // Eventos de Interface
        document.getElementById('searchButton').onclick = () => fetchVideos(searchInput.value);
        searchInput.onkeypress = (e) => { 
            if(e.key === 'Enter') fetchVideos(searchInput.value); 
        };
        
        document.getElementById('loginBtn').onclick = () => {
            window.pendingAuthAction = null;
            tokenClient?.requestAccessToken({ prompt: 'select_account' });
        };
        
        document.getElementById('menuBtn').onclick = () => {
            document.getElementById('sidebar').classList.toggle('collapsed');
            document.body.classList.toggle('sidebar-collapsed');
        };
        
        document.getElementById('logoBtn').onclick = loadHome;

        document.querySelectorAll('.nav-item').forEach(item => {
            item.onclick = (e) => {
                e.preventDefault();
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                
                if (item.id === 'navHome') {
                    loadHome();
                } else if (item.id === 'navSubscriptions') {
                    requireAuth(() => fetchAuthorizedData('subscriptions'));
                } else if (item.id === 'navMusic') {
                    showView('music');
                    fetchMusicByGenre('Pop Hits 2024');
                } else if (item.id === 'navHistory') {
                    requireAuth(() => fetchAuthorizedData('history'));
                } else {
                    fetchVideos(item.dataset.query);
                }
            };
        });

        // Controle de Voz
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'pt-BR';
        document.getElementById('micBtn').onclick = () => {
            document.getElementById('voiceSearchModal').classList.remove('hidden');
            recognition.start();
        };
        recognition.onresult = (e) => {
            const res = e.results[0][0].transcript;
            searchInput.value = res;
            document.getElementById('voiceStatusText').textContent = `Buscando: ${res}`;
            setTimeout(() => {
                document.getElementById('voiceSearchModal').classList.add('hidden');
                fetchVideos(res);
            }, 1000);
        };
        document.getElementById('closeVoiceBtn').onclick = () => document.getElementById('voiceSearchModal').classList.add('hidden');

        function showView(v) {
            homeGrid.classList.toggle('hidden', v !== 'home');
            document.getElementById('filterChips').classList.toggle('hidden', v !== 'home');
            watchSection.classList.toggle('hidden', v !== 'watch');
            document.getElementById('musicSection').classList.toggle('hidden', v !== 'music');
            
            // Ajuste de cor de fundo para modo Music imersivo
            document.body.style.backgroundColor = v === 'music' ? '#030303' : 'var(--yt-bg)';
        }

        async function fetchMusicByGenre(genre, element = null) {
            if (element) {
                document.querySelectorAll('.music-chip').forEach(c => c.classList.remove('active'));
                element.classList.add('active');
            }
            
            const grid = document.getElementById('musicGrid');
            const recGrid = document.getElementById('musicGridRecommended');
            if (grid) grid.innerHTML = '<div class="spinner"></div>';
            if (recGrid) recGrid.innerHTML = '';
            
            // Simplificamos a query: Removemos videoCategoryId=10 que causa Erro 400 em chaves restritas
            const baseQuery = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=12&type=video&q=`;
            
            try {
                // Chamada principal (Busca normal com sufixos de música para garantir relevância)
                const res = await fetch(`${baseQuery}${encodeURIComponent(genre + " official music video")}&key=${API_KEY}`);
                const data = await res.json();
                
                if (data.error) throw new Error(data.error.message);
                
                if (data.items && data.items.length > 0) {
                    renderMusicGrid(data.items, 'musicGrid');
                    
                    // Mix Recomendado (Gera uma segunda lista baseada na "vibe")
                    const resRec = await fetch(`${baseQuery}${encodeURIComponent("vibe " + genre)}&key=${API_KEY}&maxResults=6`);
                    const dataRec = await resRec.json();
                    if (dataRec.items) renderMusicGrid(dataRec.items, 'musicGridRecommended');
                } else {
                    grid.innerHTML = '<p style="color:gray; text-align:center; padding:20px;">Nenhuma música disponível no momento.</p>';
                }
            } catch (err) {
                console.error("Erro na Plataforma Music:", err);
                if(grid) grid.innerHTML = `<p style="color:#ff4e4e; text-align:center; padding:20px;">Erro de conexão com o YouTube Music (400).<br><small>${err.message}</small></p>`;
            }
        }

        function renderMusicGrid(songs, targetId = 'musicGrid') {
            const container = document.getElementById(targetId);
            if (!container) return;
            
            container.innerHTML = songs.map(s => {
                const vidId = extractVideoId(s);
                if (!vidId) return '';
                
                const thumb = s.snippet.thumbnails?.maxres?.url || s.snippet.thumbnails?.high?.url || s.snippet.thumbnails?.medium?.url || '';
                
                // Registra os dados para o player global
                videoData[vidId] = {
                    title: s.snippet.title,
                    channel: s.snippet.channelTitle,
                    desc: s.snippet.description
                };

                return `
                    <div class="music-card-ytm playable-video" data-vid="${vidId}" title="${esc(s.snippet.title)}">
                        <div class="music-thumb-ytm">
                            <img src="${thumb}" loading="lazy" onerror="this.src='https://i.ytimg.com/vi/${vidId}/hqdefault.jpg'">
                            <div class="music-play-overlay">
                                <div style="background: rgba(0,0,0,0.6); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                                    <i class="fa-solid fa-play" style="font-size: 20px; margin-left: 4px;"></i>
                                </div>
                            </div>
                        </div>
                        <div class="music-info-ytm">
                            <div class="title">${esc(s.snippet.title)}</div>
                            <div class="subtitle">${esc(s.snippet.channelTitle)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function esc(s) {
            if (!s) return "";
            return s.replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;')
                    .replace(/\n/g, '<br>')
                    .replace(/\r/g, '');
        }
    </script>
</body>
</html>
